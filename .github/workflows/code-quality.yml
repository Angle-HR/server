name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: write  # needed to post coverage comments on PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  COVERAGE_THRESHOLD: 70

jobs:
  # ─────────────────────────────────────────────
  # 1. FORMAT
  # ─────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ The following files are not formatted correctly (run 'gofmt -w .'):"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ All files are correctly formatted."

      - name: Check goimports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          unimported=$(goimports -l .)
          if [ -n "$unimported" ]; then
            echo "❌ The following files have incorrect imports (run 'goimports -w .'):"
            echo "$unimported"
            exit 1
          fi
          echo "✅ All imports are correctly organised."

  # ─────────────────────────────────────────────
  # 2. LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        # v7+ required for golangci-lint v2 (see `.golangci.yml` `version: "2"`).
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

  # ─────────────────────────────────────────────
  # 3. TEST + COVERAGE
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with coverage
        run: |
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout=120s

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% is below the required threshold of ${{ env.COVERAGE_THRESHOLD }}%."
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets the required threshold of ${{ env.COVERAGE_THRESHOLD }}%."

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const coverage = execSync("go tool cover -func=coverage.out | grep total | awk '{print $3}'").toString().trim();
            const body = `## 📊 Test Coverage\n\n| Metric | Value |\n|--------|-------|\n| Total Coverage | **${coverage}** |\n| Threshold | **${{ env.COVERAGE_THRESHOLD }}%** |\n\nDownload the full report from the [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─────────────────────────────────────────────
  # 4. SECURITY SCAN
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec (SAST)
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out gosec.sarif ./..."

      - name: Upload Gosec SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif

      - name: Run govulncheck (dependency CVEs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Audit go.sum
        run: |
          go mod verify
          echo "✅ All module checksums verified."