name: Merge Gate

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.23.10"

jobs:
  # Full regression suite — runs only on merge to main
  full-check:
    name: Full Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "❌ go.mod or go.sum is out of sync. Run 'go mod tidy' and commit the result." && exit 1)

      - name: Build
        run: go build ./...

      - name: Run full test suite (with race detector)
        run: go test -race -count=1 -timeout=180s ./...

      - name: Run golangci-lint (strict)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m --max-same-issues=0 --max-issues-per-linter=0

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out gosec.sarif ./..."

      - name: Upload Gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif