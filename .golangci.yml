# .golangci.yml — golangci-lint v2
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true

output:
  formats:
    text:
      path: stdout
      colors: true

formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes: github.com/Angle-HR/server
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/Angle-HR/server)

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - exhaustive
    - forbidigo
    - gocognit
    - goconst
    - gocritic
    - godot
    - goprintffuncname
    - gosec
    - lll
    - makezero
    - misspell
    - mnd
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - usetesting
    - unconvert
    - unparam
    - wastedassign
    - whitespace

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment

    lll:
      line-length: 120

    cyclop:
      max-complexity: 15

    gocognit:
      min-complexity: 20

    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "10"
        - "100"
      ignored-functions:
        - "math.*"
        - "time.*"

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    misspell:
      locale: US

    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: indent-error-flow
        - name: error-strings
        - name: error-return
        - name: receiver-naming

    forbidigo:
      forbid:
        - pattern: "^fmt\\.Print(ln|f)?$"
          msg: "Use a structured logger instead of fmt.Print"

    gosec:
      excludes:
        - G104

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - mnd
          - dupl
          - lll
          - gocritic
          - unparam
          - gosec
      - path: "migration"
        linters:
          - mnd

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
